name: Generate Activity Report

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history

      - name: Generate activity.md
        run: |
          # Header for activity.md
          cat <<EOF > activity.md
          # Labs Activity Sorted by Project (Lab)
          
          This report is automatically generated by shallow cloning the mirrored repositories anonymously to determine their most recent commit activity. Projects are grouped by their display names.
          
          EOF

          # Create a temporary flat list of ALL repositories with their Lab names
          # Format: latest_timestamp|org|repo|display_name
          ALL_REPOS_TMP=$(mktemp)

          # Use jq to iterate over all labs and their repositories
          echo "Cloning and checking activity for all repositories..."
          
          NUM_LABS=$(jq '.labs | length' repos.json)
          for ((i=0; i<NUM_LABS; i++)); do
            DISPLAY_NAME=$(jq -r ".labs[$i].display_name" repos.json)
            NUM_REPOS=$(jq ".labs[$i].repositories | length" repos.json)
            
            for ((j=0; j<NUM_REPOS; j++)); do
              ORG=$(jq -r ".labs[$i].repositories[$j].org" repos.json)
              REPO=$(jq -r ".labs[$i].repositories[$j].name" repos.json)
              
              echo "  Checking ${ORG}/${REPO} (${DISPLAY_NAME})..."
              
              REPO_DIR="tmp_clone_${ORG}_${REPO}"
              if git clone --depth 1 "https://github.com/${ORG}/${REPO}.git" "$REPO_DIR" --quiet; then
                TIMESTAMP=$(git -C "$REPO_DIR" log -1 --format="%at" 2>/dev/null)
                if [ -n "$TIMESTAMP" ]; then
                  echo "$TIMESTAMP|$ORG|$REPO|$DISPLAY_NAME" >> "$ALL_REPOS_TMP"
                fi
                rm -rf "$REPO_DIR"
              else
                echo "    Failed to clone ${ORG}/${REPO}"
              fi
            done
          done

          # Now generate activity.md grouped by Lab Name (Display Name)
          # Get unique display names from repos.json to maintain consistent order (or alphabetical)
          LAB_NAMES=$(jq -r '.labs[].display_name' repos.json | sort -u)

          IFS=$'\n'
          for lab in $LAB_NAMES; do
            # Only create a section if there is at least one repo with activity
            if grep -q "|$lab$" "$ALL_REPOS_TMP"; then
              echo "Generating section for Lab: $lab..."
              echo "## $lab" >> activity.md
              echo "| Activity Date | Repository | Link |" >> activity.md
              echo "| :--- | :--- | :--- |" >> activity.md
              
              # Filter the flat list for this lab and sort by timestamp descending
              grep "|$lab$" "$ALL_REPOS_TMP" | sort -rn | while IFS='|' read timestamp org repo display_name; do
                date_str=$(date -d "@$timestamp" "+%Y-%m-%d %H:%M:%S")
                printf "| %s | %s | [github.com/%s/%s](https://github.com/%s/%s) |\n" \
                  "$date_str" "$org/$repo" "$org" "$repo" "$org" "$repo" >> activity.md
              done
              echo "" >> activity.md
            fi
          done

          rm "$ALL_REPOS_TMP"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add activity.md
          git commit -m "Update activity.md with latest activity grouped by org" || echo "No changes to commit"
          git push
