name: Generate Activity Report

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history

      - name: Generate activity.md
        run: |
          # Header for activity.md
          cat <<EOF > activity.md
          # Labs Activity Sorted by Group and Activity
          
          This report is automatically generated by shallow cloning the mirrored repositories anonymously to determine their most recent commit activity.
          
          EOF

          # Iterate through orgs in repos.json using jq
          # Ensure jq is installed (it is on ubuntu-latest)
          ORGS=$(jq -r 'keys[]' repos.json)

          for org in $ORGS; do
            echo "Processing Organization: $org..."
            
            # Section Header for the Org
            echo "## $org" >> activity.md
            echo "| Activity Date | Lab Name | Repository Link |" >> activity.md
            echo "| :--- | :--- | :--- |" >> activity.md
            
            # Temporary list for this Org to sort by activity
            ORG_TMP=$(mktemp)
            
            # Get the list of repos for this org from repos.json
            REPOS=$(jq -r ".\"$org\"[]" repos.json)
            
            for repo in $REPOS; do
              # Shallow clone anonymously to a temporary directory
              REPO_DIR="tmp_clone_${org}_${repo}"
              if git clone --depth 1 "https://github.com/${org}/${repo}.git" "$REPO_DIR" --quiet; then
                # Get latest commit timestamp
                latest_commit=$(git -C "$REPO_DIR" log -1 --format="%at" 2>/dev/null)
                if [ -n "$latest_commit" ]; then
                  echo "$latest_commit|$repo" >> "$ORG_TMP"
                fi
                # Clean up immediately to save disk space
                rm -rf "$REPO_DIR"
              else
                echo "Failed to clone ${org}/${repo}"
              fi
            done
            
            # Sort labs within this Org by activity (descending)
            if [ -s "$ORG_TMP" ]; then
              sort -rn "$ORG_TMP" | while IFS='|' read timestamp lab; do
                date_str=$(date -d "@$timestamp" "+%Y-%m-%d %H:%M:%S")
                printf "| %s | %s | [github.com/%s/%s](https://github.com/%s/%s) |\n" \
                  "$date_str" "$org/$lab" "$org" "$lab" "$org" "$lab" >> activity.md
              done
            else
              echo "| (No active labs found or cloning failed) | | |" >> activity.md
            fi
            
            echo "" >> activity.md # Spacer
            rm "$ORG_TMP"
          done

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add activity.md
          git commit -m "Update activity.md with latest activity grouped by org" || echo "No changes to commit"
          git push
